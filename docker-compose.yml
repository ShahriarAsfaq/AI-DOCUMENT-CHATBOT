version: '3.9'

services:
  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py process_documents && python manage.py collectstatic --noinput && gunicorn ai_chatbot.wsgi:application --bind 0.0.0.0:8000 --workers 1"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./vectors/faiss_store:/app/vectors/faiss_store
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
